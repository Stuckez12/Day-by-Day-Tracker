services:
  db:
    image: postgres:17 
    ports:
      - ${DATABASE_PORT}:5432
    networks:
      - app-network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
        POSTGRES_USER: ${DATABASE_USERNAME}
        POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
        POSTGRES_PORT: ${DATABASE_PORT}
    env_file: .env.prod
    attach: false
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "6000:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    networks:
      - app-network
    attach: false
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - api
    networks:
      - app-network
    restart: unless-stopped

  api:
    image: stukez12/day-by-day-tracker-api:${APP_VERSION}
    expose:
      - "8000"
    networks:
      - app-network
    env_file:
      - .env.prod
    restart: unless-stopped
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000

  frontend:
    image: stukez12/day-by-day-tracker-frontend:${APP_VERSION}
    expose:
      - "3000"
    networks:
      - app-network
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file: .env.prod
    restart: unless-stopped

  redis:
    image: redis:8.2.5-bookworm
    container_name: redis
    command: redis-server --save 7200 1 --loglevel warning
    ports:
      - "6379:6379"
    networks:
      - app-network
    volumes:
      - redis-data:/data/
    restart: unless-stopped

  beat-scheduler:
    image: stukez12/day-by-day-tracker-api:${APP_VERSION}
    expose:
      - "8001"
    networks:
      - app-network
    volumes:
      - ./src:/worker/src
    env_file: .env
    entrypoint: celery -A src.main beat --loglevel=INFO

  worker:
    image: stukez12/day-by-day-tracker-api:${APP_VERSION}
    expose:
      - "8002"
    networks:
      - app-network
    volumes:
      - ./src:/worker/src
      - ${EXTERNAL_BACKUP_PATH}:${BACKUP_PATH}
    env_file: .env
    entrypoint: celery -A src.main worker -Ofair --concurrency=4 --loglevel=INFO -E


networks:
  app-network:


volumes:
  pgadmin-data:
  postgres_data:
