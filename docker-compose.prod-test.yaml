services:
  db:
    image: postgres:17 
    ports:
      - ${DATABASE_PORT}:5432
    networks:
      - app-network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
        POSTGRES_USER: ${DATABASE_USERNAME}
        POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
        POSTGRES_PORT: ${DATABASE_PORT}
    attach: false
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - api
    networks:
      - app-network
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: src/Dockerfile
    expose:
      - "8000"
    networks:
      - app-network
    env_file: .env.example
    restart: unless-stopped
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    expose:
      - "3000"
    networks:
      - app-network
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped

  redis:
    image: redis:8.2.5-bookworm
    container_name: redis
    command: redis-server --save 7200 1 --loglevel warning
    expose:
      - "6379"
    networks:
      - app-network
    volumes:
      - redis-data:/data/
    restart: unless-stopped

  beat-scheduler:
    build:
      context: .
      dockerfile: src/Dockerfile.worker
    expose:
      - "8001"
    networks:
      - app-network
    env_file: .env.example
    entrypoint: celery -A src.main beat --loglevel=INFO

  worker:
    build:
      context: .
      dockerfile: src/Dockerfile.worker
    expose:
      - "8002"
    networks:
      - app-network
    env_file: .env.example
    entrypoint: celery -A src.main worker -Ofair --concurrency=4 --loglevel=INFO -E


networks:
  app-network:


volumes:
  pgadmin-data:
  postgres_data:
  redis-data:
