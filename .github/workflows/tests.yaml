name: Backend API CI

on:
  workflow_dispatch:
  push:
  release:
    types: [published]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ruff
        uses: astral-sh/ruff-action@v3
        with:
          args: check src --config pyproject.toml

  linting:
    needs: ruff
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Sync Packages
        run: |
          pip install uv
          uv sync

      - name: Run ty
        run: |
          uv run ty check ./src

  tests:
    needs: linting
    runs-on: ubuntu-latest

    services:
      postgres-testing:
        image: postgres:17
        env:
          POSTGRES_USER: testing
          POSTGRES_PASSWORD: testing
          POSTGRES_DB: test_dbdt
        ports:
          - 5435:5432
        options: >-
          --health-cmd="pg_isready -U myuser"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: 0.9.11

      - name: Sync Packages
        run: |
          uv sync

      - name: Tests Execution
        run: uv run pytest -vv
        env:
          APP_ENV: test

          # Database
          DATABASE_USERNAME: testing
          DATABASE_PASSWORD: testing
          DATABASE_HOST: localhost
          DATABASE_PORT: 5435
          DATABASE_DB_NAME: test_dbdt

          # Celery
          REDIS_URL: redis://localhost:6379

          # Backup file paths
          EXTERNAL_BACKUP_PATH: ${{ github.workspace }}
          BACKUP_PATH: /
