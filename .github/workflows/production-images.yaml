name: Production Ready Test

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start Application
        run: docker compose -f docker-compose.prod-test.yaml up -d

      - name: Wait time
        run: sleep 12

      - name: Docker ps
        run: docker ps

      - name: Docker logs
        run: docker logs day-by-day-tracker-db-1

      - name: Frontend check
        run: |
          curl --fail http://localhost/login

      - name: API check
        run: |
          curl --fail http://localhost/api/docs

      - name: Celery Task check
        run: |
          curl http://localhost/api/v1/tasks/simulate-task
